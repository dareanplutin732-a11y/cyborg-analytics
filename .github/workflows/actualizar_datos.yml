name: Automatizacion Cyborg Analytics

on:
  schedule:
    - cron: '0 11,21 * * *'
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando el codigo del repositorio
      uses: actions/checkout@v3

    - name: 2. Configurando Python en la nube
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalando librerias matematicas y scrapers
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Ejecutando Scrapers NBA
      run: |
        python scrapers/get_team_stats.py
        python scrapers/get_real_odds.py
        python scrapers/get_injuries.py

    - name: 5. Ejecutando Scrapers MLB
      run: |
        python scrapers/get_mlb_stats.py
        python scrapers/get_mlb_odds.py
        python scrapers/get_pitchers.py

    - name: 6. Recalculando Modelos de Poisson Avanzados
      run: |
        python models/poisson_model.py

    - name: 7. Guardando y subiendo datos nuevos a GitHub
      run: |
        git config --global user.name 'Cyborg Automation Bot'
        git config --global user.email 'bot@cyborganalytics.com'
        git add data/cyborg_db.sqlite
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Base de datos actualizada por el Servidor Virtual" && git push)
